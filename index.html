<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tormat 3.0 - EdTech Hub</title>
    <style>
        /* VARIABLES Y DISEÑO BASE */
        :root { --primary: #2563eb; --accent: #f59e0b; --eco: #059669; --danger: #ef4444; --bg: #f8fafc; --text: #1e293b; --card: #ffffff; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 50px; }
        * { box-sizing: border-box; }

        /* NAVEGACIÓN */
        .navbar { background: var(--card); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 900; font-size: 1.5rem; color: var(--primary); letter-spacing: -0.5px; }
        .badge { background: #e0f2fe; color: #0369a1; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; }

        .container { padding: 20px 5%; max-width: 800px; margin: auto; }
        h2 { text-align: center; color: var(--text); font-size: 1.5rem; margin-top: 30px; margin-bottom: 20px;}

        /* TARJETAS MODERNAS */
        .card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); margin-bottom: 25px; border: 1px solid #e2e8f0; }
        
        /* FORMULARIOS Y BOTONES */
        input, select { width: 100%; padding: 14px; margin: 8px 0 15px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 1rem; outline: none; transition: 0.3s; background: #f8fafc; }
        input:focus, select:focus { border-color: var(--primary); background: white; }
        
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; color: white; }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); }
        .btn-warning { background: var(--accent); color: #fff; }
        .btn-eco { background: var(--eco); }
